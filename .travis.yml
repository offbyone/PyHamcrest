language: python

python:
    - 2.5
    - 2.6
    - 2.7
    - 3.2
    - 3.3
    - pypy
    - jython

env:
  matrix:
    - NUMPY="true"
    - NUMPY="false"

matrix:
    exclude:
      - python: pypy
        env: NUMPY="true"
      - python: 3.2
        env: NUMPY="true"
      - python: 3.3
        env: NUMPY="true"
      - python: jython
        env: NUMPY="true"

    allow_failures:
      - python: 3.3
        env: NUMPY="false"
      - python: jython
        env: NUMPY="false"

before_install:
  - if [[ $TRAVIS_PYTHON_VERSION == "3.3" ]]; then export PYTHONHASHSEED=1; fi

install:
    - if [[ $TRAVIS_PYTHON_VERSION == '2.5' ]]; then pip install --use-mirrors unittest2; fi
    - if [[ $TRAVIS_PYTHON_VERSION == '2.6' ]]; then pip install --use-mirrors unittest2; fi
    - if [[ $NUMPY == "true" ]]; then pip install numpy; fi
    - pip install . --use-mirrors

before_script:
  - if [[ $TRAVIS_PYTHON_VERSION == "jython" ]]; then jython -c "print ''"; fi

script:
    # Must cd somewhere else so python3 doesn't get confused and run
    # the python2 code from the current directory instead of the installed
    # 2to3 version.
    - which python
    - which nosetests
    - pip freeze
    - python setup.py build --build-lib=build/lib
    - nosetests -v -w build/lib hamcrest_unit_test
